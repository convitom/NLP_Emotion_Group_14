
run_base_dir: "/content/drive/MyDrive"
# run_base_dir: "."


#  Data

data:
  data_dir:   "data/"
  train_file: "data1_train.csv"   
  val_file:   "data1_val.csv"
  test_file:  "data1_test.csv"

  auto_split:  false    # if true, splits train_file into train / val / test automatically
  val_ratio:   0.10
  test_ratio:  0.10

  max_length:  128      # maximum tokenised sequence length (tokens)
  seed:        42
  num_workers: 2       


#  E2E model and training

e2e:
  model:
    name:    "bert" # bert / electra / roberta
    dropout: 0.2

  training:
    epochs:                  20
    batch_size:              32
    lr:                      2.0e-5
    weight_decay:            0.05
    optimizer:               "adamw"
    scheduler:               "cosine_warmup"
    warmup_ratio:            0.10
    early_stopping_patience: 5        
    threshold:               0.5      

    # Training mode 
    
    training_mode: "finetune"  # finetune / from_scratch / freeze_backbone / llrd

    llrd_decay_rate: 0.8

    # Inference 
    
    inference_window: 1 

    # Loss function 
    
    loss: "asymmetric" # bce | bce_weighted | asymmetric 
    asl_gamma_pos: 0.0
    asl_gamma_neg: 2.0
    asl_clip:      0.05

    # Augmentation
    augment: true
