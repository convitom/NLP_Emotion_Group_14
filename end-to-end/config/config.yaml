run_base_dir: "/content/drive/MyDrive"

data:
  data_dir:   "data/"
  train_file: "data1_train.csv"
  val_file:   "data1_val.csv"
  test_file:  "data1_test.csv"

  auto_split:  false
  val_ratio:   0.10
  test_ratio:  0.10

  max_length:  128
  seed:        42
  num_workers: 2

e2e:
  model:
    name:    "bert"
    dropout: 0.2

  training:
    epochs:                  20
    batch_size:              32
    lr:                      2.0e-5
    weight_decay:            0.05
    optimizer:               "adamw"
    scheduler:               "cosine_warmup"
    warmup_ratio:            0.10
    early_stopping_patience: 5
    threshold:               0.5

    training_mode: "finetune"

    llrd_decay_rate: 0.8

    loss: "per_class_asl"

    very_rare_divisor: 2.0
    rare_divisor:      1.0

    augment_rare:         true
    aug_copies_very_rare: 2
    aug_copies_rare:      1
    aug_copies_common:    0

    use_weighted_sampler: true
    sampler_power:        0.7
    boost_very_rare:      2.0
    boost_rare:           1.5
    boost_common:         1.0

    pw_scale_very_rare: 2.0
    pw_scale_rare:      1.5
    pw_scale_common:    1.0

    asl_gamma_pos_very_rare: 0.0
    asl_gamma_neg_very_rare: 0.5
    asl_clip_very_rare:      0.0

    asl_gamma_pos_rare:      0.5
    asl_gamma_neg_rare:      1.0
    asl_clip_rare:           0.0

    asl_gamma_pos_common:    1.0
    asl_gamma_neg_common:    2.0
    asl_clip_common:         0.0
